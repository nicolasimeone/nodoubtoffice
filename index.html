<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Doubt Office</title>

<style>

@font-face {
    font-family: 'Neue Haas Display';
    src: url('./NeueHaasDisplayMediu.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    background: #f5f5f5;
    color: #111;
    font-family: 'Neue Haas Display', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.hero {
    padding: 8vw;
    max-width: 1400px;

    font-size: clamp(48px, 6vw, 96px);
    line-height: 0.92;
    letter-spacing: -0.03em;
}

.contact {
    position: fixed;
    left: 8vw;
    bottom: 40px;

    font-size: 16px;
    line-height: 1.35;
    letter-spacing: -0.01em;
}

.contact a {
    color: inherit;
    text-decoration: none;
}

.contact a:hover {
    opacity: 0.5;
}

@media (max-width: 768px) {

    .hero {
        padding: 32px;
        font-size: 44px;
        line-height: 0.95;
    }

    .contact {
        left: 32px;
        bottom: 32px;
        font-size: 15px;
    }
}

</style>
</head>

<body>

<div class="hero">
    Creative consulting,<br>
    design and direction.
    <br><br>
    Currently available<br>
    for new projects.
</div>

<div class="contact">
    <a href="mailto:hello@nodoubtoffice.com">
        hello@nodoubtoffice.com
    </a>
    <br>
    <a href="https://instagram.com/nodoubtoffice" target="_blank">
        @nodoubtoffice
    </a>
</div>

</body>
</html>
