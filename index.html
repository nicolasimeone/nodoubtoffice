<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Doubt Office</title>

<style>

@font-face {
    font-family: 'Neue Haas Display';
    src: url('./NeueHaasDisplayMediu.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
}

body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #ffffff;
    color: #111111;
    font-family: 'Neue Haas Display', Helvetica, Arial, sans-serif;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    letter-spacing: -0.03em;
}

.content {
    text-align: center;
    padding: 40px;
    max-width: none;
}

.hero {
    font-size: 32px;
    line-height: 0.95;
    margin-bottom: 12px;
}

.subline {
    font-size: 32px;
    margin-bottom: 12px;
}

.contact {
    font-size: 16px;
    line-height: 1.5;
}

.contact-label {
    margin-bottom: 10px;
    opacity: 0.5;
}

a {
    color: inherit;
    text-decoration: none;
}

a:hover {
    opacity: 0.5;
}

</style>
</head>

<body>

<div class="content">

    <div class="hero">
        Creative consulting, design and direction.
    </div>

    <div class="subline">
        Currently available for new projects.
    </div>

    <div class="contact">
        <div class="contact-label">
            Get in touch:
        </div>

        <a href="mailto:info@nodoubtoffice.com">
            info@nodoubtoffice.com
        </a>

        <br>

        <a href="https://instagram.com/nodoubtoffice" target="_blank">
            @nodoubtoffice
        </a>
    </div>

</div>

</body>
</html>
