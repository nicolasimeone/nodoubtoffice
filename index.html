<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>No Doubt Office</title>

<style>
@font-face {
    font-family: 'Neue Haas Display';
    src: url('./NeueHaasDisplayMediu.ttf') format('truetype');
    font-weight: 500;
    font-style: normal;
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    min-height: 100vh;
    background: #ffffff;
    color: #111111;
    font-family: 'Neue Haas Display', Helvetica, Arial, sans-serif;
    font-weight: 500;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
}

.main {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
}

.hero {
    max-width: none;
    font-size: clamp(42px, 6vw, 90px);
    line-height: 0.95;
    letter-spacing: -0.04em;
}

.hero div:first-child {
    margin-bottom: 18px;
}

.contact {
    position: fixed;
    bottom: 42px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    font-size: 16px;
    line-height: 1.45;
    letter-spacing: -0.01em;
}

.contact-label {
    opacity: 0.45;
    margin-bottom: 8px;
}

a {
    color: inherit;
    text-decoration: none;
}

a:hover {
    opacity: 0.5;
}

@media (max-width: 600px) {
    .main {
        padding: 28px;
    }

    .hero {
        font-size: 44px;
        line-height: 0.95;
    }

    .contact {
        bottom: 34px;
        font-size: 15px;
        width: 100%;
        padding: 0 28px;
    }
}
</style>
</head>

<body>

<main class="main">
    <div class="hero">
        <div>Creative consulting, design and direction.</div>
        <div>Currently available for new projects.</div>
    </div>
</main>

<div class="contact">
    <div class="contact-label">Get in touch:</div>
    <a href="mailto:info@nodoubtoffice.com">info@nodoubtoffice.com</a>
    <br>
    <a href="https://instagram.com/nodoubtoffice" target="_blank">@nodoubtoffice</a>
</div>

</body>
</html>
